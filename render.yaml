# Render Blueprint — deploys the all-in-one CRM as a free Docker Web Service.
#
# Free tier on Render: 750 h/month, 512 MB RAM, NO credit card required.
# Cold-starts after 15 min idle (first request after idle takes ~30 s).
#
# Steps:
#   1. Push this repo to GitHub (already done)
#   2. Go to https://render.com → sign up with GitHub → New → Blueprint
#   3. Pick this repo → Render reads this file and deploys everything
#   4. SQLite is the default DB — no extra provisioning needed
services:
  - type: web
    name: crm
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
